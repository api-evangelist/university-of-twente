aid: university-of-twente
name: University of Twente
description: >-
  The University of Twente (Universiteit Twente, UT), founded in 1961 in
  Enschede, Netherlands, is a public technical research university and ranks
  #233 in the QS World University Rankings 2025. Its publicly confirmable
  developer/API footprint is modest. The university runs a Pure-based research
  information system, UT Research Information (research.utwente.nl), which is
  documented as exposing an OAI-PMH metadata harvesting endpoint, though that
  endpoint is not openly reachable from the public web front-end at time of
  review. Source code from the university and its research groups is published
  across several GitHub organizations. The University of Twente is also a
  co-founding member of the 4TU.ResearchData repository (data.4tu.nl), which is
  hosted and governed by TU Delft rather than operated by UT itself.
