reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      The University of Twente has a limited publicly documented API footprint.
      The official website, the Pure research portal (research.utwente.nl), the
      official GitHub organization, and the 4TU.ResearchData institution page
      all resolve live (HTTP 200). UT Research Information (Pure) is documented
      as offering an OAI-PMH harvesting endpoint, but every OAI base-URL variant
      probed returned an error/500 or redirected to an error page, so no working
      public OAI-PMH endpoint was confirmed; it is cataloged on documented
      evidence only with no baseURL asserted. 4TU.ResearchData is co-founded by
      UT but hosted and governed by TU Delft, so it is referenced rather than
      claimed as a UT-operated API. No endpoints were fabricated.
    endpoints:
      - url: https://www.utwente.nl/en/
        status: 200
        note: Official institutional website (English).
      - url: https://research.utwente.nl/
        status: 200
        note: UT Research Information (Pure) public portal, live.
      - url: https://www.utwente.nl/en/service-portal/university-library/publication-archiving/ut-research-information-pure
        status: 200
        note: Library documentation page describing Pure RIS and its OAI-PMH endpoint.
      - url: https://research.utwente.nl/ws/oai?verb=Identify
